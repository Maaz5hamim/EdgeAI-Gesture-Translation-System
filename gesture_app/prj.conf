# ==========================================
# 1. HARDWARE, SENSORS, & GPIO
# ==========================================
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DS3=y
CONFIG_LSM6DS3_TRIGGER_GLOBAL_THREAD=y
CONFIG_GPIO=y

# ==========================================
# 2. C++ AND TINYML (TENSORFLOW)
# ==========================================
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_TENSORFLOW_LITE_MICRO=y
CONFIG_FPU=y
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_NN=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ==========================================
# 3. BLUETOOTH CORE
# ==========================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="EdgeAI Gesture Translation System"
CONFIG_BT_DEVICE_APPEARANCE=961
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CONN_CTX=y

# ==========================================
# 4. BLUETOOTH HID & SERVICES
# ==========================================
CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_MAX_CLIENT_COUNT=1
CONFIG_BT_HIDS_DEFAULT_PERM_RW_ENCRYPT=y
CONFIG_BT_HIDS_INPUT_REP_MAX=1

CONFIG_BT_BAS=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=y
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x1915
CONFIG_BT_DIS_PNP_PID=0x0001
CONFIG_BT_DIS_PNP_VER=0x0100

# ==========================================
# 5. BLUETOOTH SECURITY & BONDING (iOS/OSX COMPATIBILITY)
# ==========================================
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_BONDING_REQUIRED=n
CONFIG_BT_SMP_SC_ONLY=n
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_GATT_AUTO_SEC_REQ=n
CONFIG_BT_AUTO_PHY_UPDATE=n

# ==========================================
# 6. FLASH & SETTINGS (FOR SAVING BLUETOOTH PAIRINGS)
# ==========================================
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ==========================================
# 7. BLUETOOTH MEMORY POOLS
# ==========================================
CONFIG_BT_GATT_UUID16_POOL_SIZE=40
CONFIG_BT_GATT_CHRC_POOL_SIZE=20
CONFIG_BT_ATT_TX_COUNT=5

# ==========================================
# 8. SYSTEM STACKS & HEAP
# ==========================================
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ==========================================
# 9. LOGGING & DEBUG
# ==========================================
CONFIG_LOG=y
# Uncomment below if you need deep Bluetooth debugging
# CONFIG_LOG_BACKEND_UART=y
# CONFIG_BT_LOG_LEVEL_WRN=y